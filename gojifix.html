<script type="text/javascript" src="goji_fix.js" charset="utf-8"></script>
<script type="text/javascript" src="coffee_cat.js" charset="utf-8"></script>
<script type="text/javascript" src="goblin.js" charset="utf-8"></script>
<script type="text/javascript">
"use strict";
function $(t){
	return document.getElementById(t);
}
$('button_view_options').addEventListener('click', function(){
	if($('view_options').style.display == 'none'){
		$('view_options').style.display = 'inline';
	}else{
		$('view_options').style.display = 'none';
	}
});
$('button_clear').addEventListener('click', function(){
//	if(window.confirm('入力テキストをクリアしますか？')){
	$('text_main').value = '';
//	}
});
$('button_sample').addEventListener('click', function(){
;
	const t = `文章のサンプルとして小説を用意しました。
・ラブコメ　　  3,000文字 「コーヒーと猫」
・ファンタジー 35,000文字 「転生者ゴブリン初の貴族を目指します」\n\n` +
text_coffee_cat + '\n\n' + text_goblin;
	$('text_main').value = t;
});

let global_memo = `ここにはメモを一時的に記録することができます。
ブラウザのプログラムのJavaScriptの変数上に保存されます。
メモリー上に展開され、ファイルなどには保存されません。
F5などの再読み込みでも消えます。`;

$('button_memo_save').addEventListener('click', function(){
	global_memo = $('text_main').value;
});

$('button_memo_load').addEventListener('click', function(){
	$('text_main').value = global_memo;
});

$('button_goji').addEventListener('click', function(){
	$('result').textContent = '処理中.........';
	const call_gojifix = function(text, head){
		try{
			$('result').innerHTML = head + goji_fix(text,
				$('check_warning').checked, 
				$('check_warning2').checked,
				$('check_line').checked,
				$('check_yure').checked,
				$('text_musi').value
			);
		}catch(e){
			$('result').innerHTML = ('■エラーが発生しました。\n' + e.message).replace(/\n/g, '<br>');
			throw e;
			return false;
		}
		return true;
	};
	window.setTimeout(function(){
		$('result').textContent = '処理中(分割).......';
		const text_all = $('text_main').value;
		const limit_len = 20000; // 20K 2万文字
		if(limit_len < text_all.length){
			window.setTimeout(function(){
				const r = call_gojifix(text_all.substr(0,limit_len), '(先頭2万字先行解析、全文処理中)...<br>');
				if(r){
					window.setTimeout(function(){
						call_gojifix(text_all, '全文解析完了<br>');
					},100);
				}
			},50);
		}else{
			$('result').textContent = '処理中(一括).........';
			window.setTimeout(call_gojifix(text_all, ''),50);
		}
	},50);
});
$('set_file').addEventListener('change', function(){
	read_files($('text_main'), event.target.files);
});
$('button_set_musi').addEventListener('click', function(){
	const t = `+ほげ■テスト
にも関わらず
かも知れな
伺
窺
友だち
在
有
居
尚
又は
且
但
成ら
成り
成る
成れ
成ろ
成ん
無い
無かった
無かろう
無く
無けれ
無そう
無さそう
無さすぎ
無さ過ぎ
周り
履
穿
篭
荒げ
何故
何処
グレード
グレート
ホーム
フォーム
シャベル
スコップ
バグ
●(無効)此
●(無効)其
`;
	$('text_musi').value = t;
});
</script>
