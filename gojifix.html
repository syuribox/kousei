<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>小説誤字fix(js)</title>
<meta name="viewport" content="width=device-width">
</head>
<body>
<h1>小説誤字fix(js)</h1>
<form name="mainform">
<input type="button" id="button_clear" value="クリア">
<input type="button" id="button_sample" value="サンプル文" >
<input type="file" id="set_file">
<br>
<textarea id="text_main" cols="60" rows="8" style="width:95%">
</textarea><br>
警告無視リスト：<br>
<textarea id="text_musi" cols="60" rows="3" style="width:95%">
</textarea><br>
　<input type="checkbox" id="check_warning" value="1" checked><label for="check_warning">警告情報</label>
　<input type="checkbox" id="check_warning2" value="1"><label for="check_warning2">注意情報</label>
　<input type="checkbox" id="check_yure" value="1"><label for="check_yure">表記ゆれ</label><br>
　<input type="checkbox" id="check_line" value="1" checked><label for="check_line">情報行のみ</label>
　<input type="button" id="button_goji" value="誤字確認">
　<input type="button" id="button_set_musi" value="無視サンプル">
</form>
<hr>
<div id="result" style="margin:1rem; border:1px"></div>
<hr>
[<a href="./yourei/index.html">ヒント</a>]　[<a href="./yourei/help.html">ヘルプ</a>]<br>

<script type="text/javascript" src="gojifix.js" charset="utf-8"></script>
<script type="text/javascript">
function $(t){
	return document.getElementById(t);
}
$('button_clear').addEventListener('click', function(){
	if(window.confirm('入力テキストをクリアしますか？')){
		$('text_main').value = '';
	}
});
$('button_sample').addEventListener('click', function(){
	var t = 'アフリカにあるエジプトのピラミットと世界遺産です。\n' +
	'異世界では神の信託により宗教が発展しています。\n' + 
	'ハイブリット車が普及をはじめています。\n' + 
	'ウォーターベットは柔らかくて快適です。ベッドで寝ます。\n' + 
	'神の信託を受けて勇者たちが旅立ちます。信託は三回目でした。\n' + 
	'乾燥ハープを使った料理をご馳走します。ここのハープは多年草です。\n' +
	'ダイアモンドとダイヤモンドの表記があります。\n' +
	'';
	$('text_main').value = t;
});
$('button_goji').addEventListener('click', function(){
	$('result').innerHTML = '';
	window.setTimeout(function(){
	$('result').innerHTML = goji_fix($('text_main').value,
		$('check_warning').checked, 
		$('check_warning2').checked,
		$('check_line').checked,
		$('check_yure').checked,
		$('text_musi').value);
	},10);
});
$('set_file').addEventListener('change', function(){
	read_files($('text_main'), event.target.files);
});
$('button_set_musi').addEventListener('click', function(){
	var t = `にも関わらず
かも知れな
伺
窺
友だち
在
有
居
尚
又は
且
但
成ら
成り
成る
成れ
成ろ
成ん
無い
無かった
無かろう
無く
無けれ
無そう
無さそう
無さすぎ
無さ過ぎ
周り
履
穿
篭
荒げ
何故
何処
グレード
グレート
ホーム
フォーム
シャベル
スコップ
バグ
●(無効)此
●(無効)其
`;
	$('text_musi').value = t;
});
</script>
</body>
</html>
