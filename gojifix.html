<!DOCTYPE html>

<meta charset="utf-8">
<title>小説誤字fix(js)</title>

<link rel="stylesheet" type="text/css" href="yourei/style.css">
</head>
<body>
<div class="container2">
<h1>小説誤字fix</h1>
<form name="mainform">
<input type="button" id="button_view_options" value="オプション表示▼">
<br>
<div id="view_options" style="display:none">
ファイル読込<input type="file" id="set_file">
<br>
<input type="button" id="button_clear" value="クリア　">
　<input type="button" id="button_sample" value="サンプル" >
<br class="mobile-only"><span class="pc-mode">　</span>
<input type="button" id="button_memo_save" value="メモ保存" >
　<input type="button" id="button_memo_load" value="ロード　" >
<br>
<input type="checkbox" id="check_warning" value="1" checked><label for="check_warning">警告情報</label>
　<input type="checkbox" id="check_warning2" value="1"><label for="check_warning2">注意情報</label>
<br class="mobile-only"><span class="pc-mode">　</span>
<input type="checkbox" id="check_yure" value="1"><label for="check_yure">表記ゆれ</label>
　<input type="checkbox" id="check_line" value="1" checked><label for="check_line">情報行のみ</label>
</div>
<textarea id="text_main" rows="8" style="width:95%"
 placeholder="ここにテキスト(小説)を貼り付けてください。
もしくは、ファイルから開くこともできます。
">
</textarea><br>
警告無視リスト：<br>
<textarea id="text_musi" rows="3" style="width:95%">
</textarea><br>
　<input type="button" id="button_goji" value="誤字確認" class="hit-button">
　<input type="button" id="button_set_musi" value="無視サンプル">
</form>
<hr>
<div id="result" style="margin:1rem; border:1px"></div>

<script type="text/javascript" src="goji_fix.js" charset="utf-8"></script>
<script type="text/javascript">
"use strict";
function $(t){
	return document.getElementById(t);
}
$('button_view_options').addEventListener('click', function(){
	if($('view_options').style.display == 'none'){
		$('view_options').style.display = 'inline';
	}else{
		$('view_options').style.display = 'none';
	}
});
$('button_clear').addEventListener('click', function(){
//	if(window.confirm('入力テキストをクリアしますか？')){
	$('text_main').value = '';
//	}
});
$('button_sample').addEventListener('click', function(){
	var t = `アフリカにあるエジプトのピラミットと世界遺産です。
特に誤字のない行は表示されません。
デフォルトでは情報のある行のみ表示されます。
異世界では神の信託により宗教が発展しています。 
ハイブリット車が普及をはじめています。 
ウォーターベットは柔らかくて快適です。ベッドで寝ます。 
神の信託を受けて勇者たちが旅立ちます。信託は三回目でした。 
乾燥ハープを使った料理をご馳走します。ここのハープは多年草です。
ダイアモンドとダイヤモンドの表記があります。
このように異世界には不思議なことがたくさんあり、人々が暮らしています。
それでも、何事もないように生活が進んでいます。
これはサンプル文です。
ありがとうごさいます。
鍛冶と鍛治、侯爵と候爵、居侯と居候のような漢字間違いも指摘対象です。
依怙贔屓、魑魅魍魎、傷痍、難し漢字の確認。
熱狂的、狂う、といった注意を特に要する文字の情報を表示します。
様子を窺う、物陰から窺う、意見を聞くという意味の伺うといった言葉もチェックを入れます。
俺たちなどと違い、友だちは友達を推奨しています。
注意情報では、行ったと言ったといった似た文字の情報を表示します。
同じ文字でも、戦闘狂、酔狂といった語は注意情報扱いにしてあります。
他にも判定できなかった神託、信託の注意なども行います。
`;
	$('text_main').value = t;
});

var global_memo = '';

$('button_memo_save').addEventListener('click', function(){
	global_memo = $('text_main').value;
});

$('button_memo_load').addEventListener('click', function(){
	$('text_main').value = global_memo;
});

$('button_goji').addEventListener('click', function(){
	$('result').textContent = '処理中.........';
	const call_gojifix = function(text, head){
		$('result').innerHTML = head + goji_fix(text,
			$('check_warning').checked, 
			$('check_warning2').checked,
			$('check_line').checked,
			$('check_yure').checked,
			$('text_musi').value
		);
	};
	window.setTimeout(function(){
		$('result').textContent = '処理中(分割).......';
		const text_all = $('text_main').value;
		const limit_len = 100000; // 100K 10万文字
		if(limit_len < text_all.length){
			window.setTimeout(function(){
				call_gojifix(text_all.substr(0,limit_len), '(先頭10万字のみ表示、全文処理中)...<br>');
				window.setTimeout(function(){
					call_gojifix(text_all, '');
				},200);
			},50);
		}else{
			$('result').textContent = '処理中(一括).........';
			window.setTimeout(call_gojifix(text_all, ''),50);
		}
	},50);
});
$('set_file').addEventListener('change', function(){
	read_files($('text_main'), event.target.files);
});
$('button_set_musi').addEventListener('click', function(){
	var t = `にも関わらず
かも知れな
伺
窺
友だち
在
有
居
尚
又は
且
但
成ら
成り
成る
成れ
成ろ
成ん
無い
無かった
無かろう
無く
無けれ
無そう
無さそう
無さすぎ
無さ過ぎ
周り
履
穿
篭
荒げ
何故
何処
グレード
グレート
ホーム
フォーム
シャベル
スコップ
バグ
●(無効)此
●(無効)其
`;
	$('text_musi').value = t;
});
</script>
</body>
</html>
