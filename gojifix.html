	if($('view_options').style.display == 'none'){
		$('view_options').style.display = 'inline';

});
(() => {
	const str = 
`ここにはメモを一時的に記録することができます。
ブラウザのプログラムのJavaScriptの変数上に保存されます。
メモリー上に展開され、ファイルなどには保存されません。
F5などの再読み込みでも消えます。`
	set_memory1(str + '\nメモ1です。');
	set_memory2(str + '\nメモ2です。');
	const sample = 
`文章のサンプルとして小説を用意しました。
・ラブコメ　　  3,000文字 「コーヒーと猫」
・ファンタジー 35,000文字 「転生者ゴブリン初の貴族を目指します」\n\n` +

})();
$('button_func').addEventListener('click', function(){

});

$('button_goji').addEventListener('click', function(){
	$('result').textContent = '処理中.........';
	const call_gojifix = function(text, head){
		try{
			$('result').innerHTML = head + goji_fix(text,
				$('check_warning').checked, 
				$('check_warning2').checked,
				$('check_line').checked,
				$('check_yure').checked,
				$('text_musi').value
			);
		}catch(e){
			$('result').innerHTML = ('■エラーが発生しました。\n' + e.message).replace(/\n/g, '<br>');
			throw e;
			return false;
		}
		return true;
	};
	window.setTimeout(function(){
		$('result').textContent = '処理中(分割).......';
		const text_all = $('text_main').value;
		const limit_len = 50000; // 50K 5万文字
		if(limit_len < text_all.length){
			window.setTimeout(function(){
				const r = call_gojifix(text_all.substr(0,limit_len), '(先頭5万字先行解析、全文処理中)...<br>');
				if(r){
					window.setTimeout(function(){
						call_gojifix(text_all, '全文解析完了<br>');
					},100);
				}
			},50);
		}else{
			$('result').textContent = '処理中(一括).........';
			window.setTimeout(call_gojifix(text_all, ''),50);
		}
	},50);
});

(() => {
	const info = navigator.userAgent.toLowerCase();
	const bodyTag = document.getElementsByTagName('body')[0];
	let pcmac = false;
	if (info.indexOf('iphone') !== -1) {
		bodyTag.classList.add('os-apple');
	} else if (info.indexOf('ipad') !== -1) {
		bodyTag.classList.add('os-apple');
	} else if (info.indexOf('mac os x') !== -1) {
		bodyTag.classList.add('os-apple');
		bodyTag.classList.add('os-macos');
		pcmac = true;
	} else if (info.indexOf('android')  !== -1) {
		bodyTag.classList.add('os-android');
	} else if (info.indexOf('linux')  !== -1) {
		bodyTag.classList.add('os-linx');
		pcmac = true;
	} else {
		bodyTag.classList.add('os-mswindows');
		pcmac = true;
	}
	if(pcmac){
		$('text_main').placeholder = `ここにテキスト(小説)を貼り付けてください。
もしくは、ファイルまたはD＆Dから開くこともできます。
