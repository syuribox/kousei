<h2>単語</h2>
<div style="font-size:30px">近しい</div>
　ちかしい<br>
　<br>
　本来の意味は「親しい」と同じで、親密であるということ。
　心理的距離が近い、という意味。
　<br>
　2019年くらい以降から特に「近い」の意味で使うことが増えてはいるが、本来の意味ではない。
　本来で言えば「似ている」とはニュアンスが明らかに異なる。
　<br>
