<h1>小説誤字fix(js) - 用例</h1>

<h2>字</h2>
<div style="font-size:60px">頬</div>
U+982C　(推奨)　異体字<br>
JIS第1水準<br>
<div style="font-size:60px">頰</div>
U+9830　<a href="sin_jouyou.html">新常用漢字</a><br>
JIS第3水準<br>
<h2>説明</h2>
多くのフリーフォントではJIS第2水準までしか文字が収録されていないことがあります。<br>
JIS第3水準の新常用漢字は文字化けする可能性があり、webではまだ非推奨です。<br>
JIS第3水準の文字はShift_JISで表すことができず、基本的にUTF-8などを必要とします。<br>
互換性を考慮する場合は、U+982C「頬」のほうを使用します。<br>
