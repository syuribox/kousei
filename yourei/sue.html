<h1>小説誤字fix(js) - 用例</h1>
[<a href="index.html">index</a>]<br>
<h2>字</h2>
<div class="big-char">未</div>
U+672A　ミ、いま-だ　ひつじ
<div class="big-char">末</div>
U+672B　マツ　すえ
<h2>未 U+672A</h2>
(いま)未だ<br>
(ひつじ)未年<br>
(ミ)未婚、未完、未見、未詳<br>
　未実装、未実現、未完成、未装備、未適用<br>
　未テイム、未プレイ<br>
　未亡人<br>
<h2>末 U+672B</h2>
(すえ)感動の末、激闘の末、戦闘の末<br>
　考えた末、悩んだ末、迷った末<br>
(マツ)年末、月末、週末、期末、歳末、終末<br>
　世紀末、年度末<br>
　本末転倒<br>
<h3>ややこしい</h3>
年未適用→年／未適用<br>
年末適用→年末／適用<br>
