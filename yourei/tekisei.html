<h3>適正</h3>
その状態が「正しい」こと。<br>
「適正レベルのダンジョン」<br>
「適正価格で販売する」<br>
「適正試験に合格している製品」<br>
<br>
<h3>適性</h3>
適してる性質などが一致すること。<br>
相性などがいいこと。<br>
「魔法適性がある」「火魔法に適性がある」<br>
「スキルに適性があった」<br>
「職業適性検査に合格した」<br>
