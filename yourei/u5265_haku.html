<h1>小説誤字fix(js) - 用例</h1>
[<a href="index.html">index</a>]<br>
<h2>字</h2>
<div class="big-char">剥</div>
U+53B5　(推奨)　異体字<br>
JIS第1水準<br>
<div class="big-char">剝</div>
U+525D　<a href="sin_jouyou.html">新常用漢字</a><br>
JIS第3水準<br>
<h2>説明</h2>
多くのフリーフォントではJIS第2水準までしか文字が収録されていないことがあります。<br>
JIS第3水準の新常用漢字は文字化けする可能性があり、webではまだ非推奨です。<br>
JIS第3水準の文字はShift_JISで表すことができず、基本的にUTF-8などを必要とします。<br>
互換性を考慮する場合は、U+53B5「剥」のほうを使用します。<br>
